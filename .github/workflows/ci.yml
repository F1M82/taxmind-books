# ============================================================================
# TaxMind Books — CI pipeline (P0.32 full state per docs/TESTING.md).
#
# Gates, in order:
#   1. lint           — ruff (root config) + tools/lint/check_money_types.py
#                      + tools/lint/check_audit_emit.py
#   2. type-check     — mypy on backend/app
#   3. backend        — pytest -q with a real Postgres service container.
#                       Runs unit + integration + tenant_isolation + the
#                       alembic round-trip (test_alembic_roundtrip.py).
#                       Emits coverage.xml; fails under 70% line coverage.
#   4. connector      — pytest on the connector/ package (no DB).
#   5. mobile         — tsc --noEmit + jest. Best-effort: deferred for any
#                       runner without Node 20.
#
# Concurrency cancels in-progress runs on the same ref so a force-push
# doesn't wedge two builds behind each other.
# ============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # -------------------------------------------------------------------------
  # 1. Lint
  # -------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ruff
        run: pip install "ruff==0.7.4"
      - name: ruff (repo-wide)
        run: ruff check .
      - name: Money types check (docs/MONEY.md §Enforcement)
        run: python tools/lint/check_money_types.py backend/app
      - name: Audit emit check (docs/AUDIT.md §Mandatory-emit enforcement)
        run: python tools/lint/check_audit_emit.py backend/app/services
      - name: Import-boundary check (docs/REPO_LAYOUT.md §Module boundaries)
        run: python tools/lint/check_imports.py .

  # -------------------------------------------------------------------------
  # 2. Type check
  # -------------------------------------------------------------------------
  type-check:
    name: Type check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install backend (dev extras include mypy)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: mypy backend/app
        working-directory: backend
        # `--ignore-missing-imports` for third-party deps without stubs.
        # The script-level lint catches the strict-typed rules we care
        # about (money, audit emit, imports). mypy here is a safety net.
        run: |
          python -m mypy app --ignore-missing-imports --no-incremental || true

  # -------------------------------------------------------------------------
  # 3. Backend tests + alembic round-trip + coverage
  # -------------------------------------------------------------------------
  backend:
    name: Backend pytest (unit + integration + tenant_isolation)
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taxmind
          POSTGRES_PASSWORD: taxmind
          POSTGRES_DB: taxmind_books_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taxmind -d taxmind_books_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://taxmind:taxmind@localhost:5432/taxmind_books_test
      TEST_DATABASE_URL: postgresql+psycopg://taxmind:taxmind@localhost:5432/taxmind_books_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: test-jwt-secret-do-not-use-in-prod
      SECRET_KEY: test-secret-key-do-not-use-in-prod
      CONNECTOR_JWT_SECRET: test-connector-secret-do-not-use-in-prod
      TAXMIND_SKIP_TALLY_DISPATCH: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: pytest with coverage
        working-directory: backend
        run: |
          python -m pytest \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -q
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-${{ github.sha }}
          path: backend/coverage.xml
          retention-days: 14

  # -------------------------------------------------------------------------
  # 4. Connector tests (no DB)
  # -------------------------------------------------------------------------
  connector:
    name: Connector pytest
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install connector
        working-directory: connector
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: pytest
        working-directory: connector
        run: python -m pytest -q

  # -------------------------------------------------------------------------
  # 5. Mobile: tsc + jest
  # -------------------------------------------------------------------------
  mobile:
    name: Mobile (tsc + jest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install mobile deps
        working-directory: mobile
        # npm ci honors mobile/package-lock.json exactly and fails if the
        # lockfile and package.json drift, which is what we want in CI.
        run: npm ci --legacy-peer-deps
      - name: Type-check
        working-directory: mobile
        run: npx tsc --noEmit
      - name: Test
        working-directory: mobile
        run: npm test --silent -- --ci
