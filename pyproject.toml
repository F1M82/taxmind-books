# ============================================================================
# TaxMind Books — workspace-level Python configuration.
# This file configures ruff and mypy for the entire repository.
# Backend dependencies live in backend/pyproject.toml (P0.02).
# Connector dependencies live in connector/pyproject.toml (P0.21).
# ============================================================================

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
    "backend/alembic/versions",
    "**/node_modules",
    "**/.venv",
    "**/build",
    "**/dist",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # bugbear
    "C4",   # comprehensions
    "UP",   # pyupgrade
    "S",    # bandit (security)
    "SIM",  # simplify
    "TID",  # tidy imports
    "PL",   # pylint subset
    "RUF",  # ruff-specific
]
ignore = [
    "E501",   # handled by formatter
    "PLR0913", # too many args (we accept this in service signatures)
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["S101", "PLR2004"]  # allow assert + magic numbers in tests
"backend/alembic/env.py" = ["E402"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_ignores = true
warn_redundant_casts = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
plugins = ["pydantic.mypy"]
exclude = [
    "backend/alembic/versions/",
    "build/",
    "dist/",
    ".venv/",
]

[[tool.mypy.overrides]]
module = ["tests.*", "backend.tests.*", "connector.tests.*"]
disallow_untyped_defs = false

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["backend/tests", "connector/tests", "tools/tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-ra --strict-markers --strict-config"
markers = [
    "unit: pure-function tests (no DB)",
    "integration: tests requiring DB or services",
    "tenant_isolation: multi-tenant safety tests",
    "golden: golden-output fixture tests",
    "slow: tests slower than 1s",
]
